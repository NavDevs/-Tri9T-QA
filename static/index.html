<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tri9T QA Engine</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="text-8xl">QA Engine</h1>
            <div class="section-header">
                <div class="square-bullet"></div>
                <p class="mono-label">Automated test case generation & staleness detection</p>
            </div>
        </header>

        <hr class="ultra">

        <main>
            <section id="ingest-section">
                <div class="section-header">
                    <div class="square-bullet"></div>
                    <h2 class="text-4xl">1. Ingest Manual</h2>
                </div>
                <div class="upload-zone" id="upload-zone">
                    <p class="display-font" style="font-size: 2rem;">Drag & Drop PDF Document</p>
                    <p class="mono-label" style="margin-top: 1rem;">Or click to browse files</p>
                    <input type="file" id="pdf-upload" accept="application/pdf" hidden>
                </div>
                <div id="upload-status" class="status-msg"></div>
            </section>

            <hr class="thick">

            <section id="search-section">
                <div class="section-header">
                    <div class="square-bullet"></div>
                    <h2 class="text-4xl">2. Isolate Node</h2>
                </div>
                <div class="input-group">
                    <input type="text" id="search-input" placeholder="Enter keyword (e.g., 'battery')">
                    <button id="search-btn">Query</button>
                </div>
                <ul id="search-results" class="result-list"></ul>
            </section>

            <hr class="thick">

            <section id="selection-section">
                <div class="section-header">
                    <div class="square-bullet"></div>
                    <h2 class="text-4xl">3. Define Selection</h2>
                </div>
                <div class="input-group">
                    <input type="text" id="selection-name" placeholder="Selection Name">
                    <button id="create-selection-btn" disabled>Initialize</button>
                </div>
                <div id="selection-status" class="status-msg"></div>
            </section>

            <hr class="ultra">

            <section id="generation-section">
                <div class="section-header">
                    <div class="square-bullet"></div>
                    <h2 class="text-4xl">4. Generate Tests</h2>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <button id="generate-btn" disabled>Execute LLM Generation</button>
                    <button id="check-staleness-btn" disabled>Audit Staleness</button>
                </div>
                
                <div id="generation-status" class="status-msg"></div>
                
                <div id="test-cases-container" class="cards-container">
                    <!-- Test cases injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
